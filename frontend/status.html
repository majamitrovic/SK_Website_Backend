<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment status</title>
    <link rel="stylesheet" href="/assets/checkout.css">
    <script src="/config.js"></script>
</head>
<body>
    <main class="single-panel">
        <h1>Payment status</h1>
        <form id="status-form" class="status-form">
            <label>
                <span>Merchant transaction ID</span>
                <input id="merchant_transaction_id" name="merchant_transaction_id">
            </label>
            <button type="submit">Check status</button>
        </form>
        <output id="status-output" class="status" role="status"></output>
        <dl id="status-list" class="status-list"></dl>
    </main>
    <script src="/assets/status.js"></script>
</body>
</html>
